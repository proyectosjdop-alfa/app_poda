<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENEE-UTCD - Poda Comunitaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<div id="login-container" class="container">
    <header>
        <div style="background-color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
              <img src="https://raw.githubusercontent.com/proyectosjdop-alfa/app_poda/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 250px; height: auto;">
        </div>
        <h1>Acceso al Sistema</h1>
    </header>
    <div class="card" style="padding: 20px;">
        <label>Seleccione su Sector:</label>
        <select id="user">
            <option value="">Seleccione...</option>
            <option value="brus laguna">BRUS LAGUNA</option>
            <option value="choluteca">CHOLUTECA</option>
            <option value="comayagua">COMAYAGUA</option>
            <option value="danli">DANLI</option>
            <option value="el progreso">EL PROGRESO</option>
            <option value="juticalpa">JUTICALPA</option>
            <option value="la ceiba">LA CEIBA</option>
            <option value="san pedro sula">SAN PEDRO SULA</option>
            <option value="santa barbara">SANTA BARBARA</option>
            <option value="santa rosa">SANTA ROSA</option>
            <option value="santa cruz">SANTA CRUZ</option>
            <option value="tegucigalpa">TEGUCIGALPA</option>
            <option value="tocoa">TOCOA</option>
        </select>

        <label>Contraseña:</label>
        <input type="password" id="pass" placeholder="Ingrese su contraseña">
    
        <button type="button" class="btn-enviar" onclick="validarLogin()">INGRESAR</button>
        <p id="login-error" style="color: #e74c3c; font-size: 0.8rem; margin-top: 10px; display: none;">Credenciales incorrectas</p>
    </div>
</div>

<div id="form-poda-container" class="container" style="display: none;">
    <header>
        <div style="background-color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: center;">
              <img src="https://raw.githubusercontent.com/proyectosjdop-alfa/app_poda/refs/heads/main/imagenes/UTCD%20Vertical.png" alt="Logo ENEE" style="max-width: 180px; height: auto;">
        </div>
        <h1>PODA COMUNITARIA</h1>
        <p id="user-display" style="color: var(--accent); font-weight: bold; font-size: 0.8rem;"></p>
    </header>

    <form id="form-poda">
        <label>Número de Reporte ENERGIS:</label>
        <input type="text" id="poda-energis" placeholder="Ej: 3010213" required>

        <label>Circuito:</label>
        <select id="poda-circuito">
            <option value="">Cargando circuitos...</option>
        </select>

        <label>Zona de Trabajo:</label>
        <input type="text" id="poda-zona">

        <label>Fecha:</label>
        <input type="date" id="poda-fecha">

        <div class="grid-2">
            <div><label>Hora Inicio:</label><input type="time" id="h-ini"></div>
            <div><label>Hora Final:</label><input type="time" id="h-fin"></div>
        </div>

        <label>Trabajo ejecutado:</label>
        <div class="grid-3">
            <input type="number" id="m-brecha" placeholder="Brecha">
            <input type="number" id="m-poda" placeholder="Poda">
            <input type="number" id="m-postes" placeholder="Postes">
        </div>

        <label>Personal y Pagos:</label>
        <input type="number" id="poda-personas" placeholder="Personas Contratadas">

        <div class="grid-2">
            <input type="text" id="pago-mo" placeholder="Mano de Obra" oninput="formatearMoneda(this)">
            <input type="text" id="pago-trans" placeholder="Transporte" oninput="formatearMoneda(this)">
        </div>

        <label>Responsables:</label>
        <input type="text" id="resp-super" placeholder="Responsable Supervisión">
        <input type="text" id="resp-activ" placeholder="Responsable Actividades Contratista">

        <label>Fotos Grupo e Identidades:</label>
        <div class="grid-2">
            <div class="foto-input-group">
                <span>📸 GRUPO (TOMAR EN HORIZONTAL)</span>
                <input type="file" id="f-grupo" onchange="previsualizar(this, 'p-f-grupo')">
                <div id="p-f-grupo" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>📸 VEHÍCULO (TOMAR EN VERTICAL)</span>
                <input type="file" id="f-vehiculo" onchange="previsualizar(this, 'p-f-vehiculo')">
                <div id="p-f-vehiculo" class="preview-box"></div>
            </div>
        </div>

        <label>Fotos Líder de Cuadrilla:</label>
        <div class="grid-2">
        <div class="foto-input-group">
                <span>DNI LÍDER FRENTE</span>
                <input type="file" id="f-lider-f" onchange="previsualizar(this, 'p-f-liderf')">
                <div id="p-f-liderf" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>DNI LÍDER REVÉS</span>
                <input type="file" id="f-lider-r" onchange="previsualizar(this, 'p-f-liderr')">
                <div id="p-f-liderr" class="preview-box"></div>
            </div>
        </div>

        <label>Identidades Personal (Grupo 1):</label>
        <div class="grid-2">
        <div class="foto-input-group">
                <span>DNI FRENTE (1)</span>
                <input type="file" id="f-id-f" onchange="previsualizar(this, 'p-f-idf')">
                <div id="p-f-idf" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>DNI REVÉS (1)</span>
                <input type="file" id="f-id-r" onchange="previsualizar(this, 'p-f-idr')">
                <div id="p-f-idr" class="preview-box"></div>
            </div>
        </div>

        <label>Identidades Personal (Grupo 2 - Opcional):</label>
        <div class="grid-2">
        <div class="foto-input-group">
                <span>DNI FRENTE (2)</span>
                <input type="file" id="f-id-f2" onchange="previsualizar(this, 'p-f-idf2')">
                <div id="p-f-idf2" class="preview-box"></div>
            </div>
            <div class="foto-input-group">
                <span>DNI REVÉS (2)</span>
                <input type="file" id="f-id-r2" onchange="previsualizar(this, 'p-f-idr2')">
                <div id="p-f-idr2" class="preview-box"></div>
            </div>
        </div>

        <label>Fotos Antes:</label>
        <div class="grid-3">
            <div class="foto-input-group"><input type="file" id="f-ini-1" onchange="previsualizar(this, 'p-ini-1')"><div id="p-ini-1" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-ini-2" onchange="previsualizar(this, 'p-ini-2')"><div id="p-ini-2" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-ini-3" onchange="previsualizar(this, 'p-ini-3')"><div id="p-ini-3" class="preview-box"></div></div>
        </div>

        <label>Fotos Durante:</label>
        <div class="grid-3">
            <div class="foto-input-group"><input type="file" id="f-eje-1" onchange="previsualizar(this, 'p-eje-1')"><div id="p-eje-1" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-eje-2" onchange="previsualizar(this, 'p-eje-2')"><div id="p-eje-2" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-eje-3" onchange="previsualizar(this, 'p-eje-3')"><div id="p-eje-3" class="preview-box"></div></div>
        </div>

        <label>Fotos Después:</label>
        <div class="grid-3">
            <div class="foto-input-group"><input type="file" id="f-fin-1" onchange="previsualizar(this, 'p-fin-1')"><div id="p-fin-1" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-fin-2" onchange="previsualizar(this, 'p-fin-2')"><div id="p-fin-2" class="preview-box"></div></div>
            <div class="foto-input-group"><input type="file" id="f-fin-3" onchange="previsualizar(this, 'p-fin-3')"><div id="p-fin-3" class="preview-box"></div></div>
        </div>

       <label>Mapa de Ubicación:</label>
        <div id="map-poda" style="height: 250px; border-radius: 8px; margin-bottom: 10px;"></div>

        <div style="background: #1b2a36; padding: 12px; border-radius: 8px; margin-top: 10px;">
            <p style="font-size: 0.75rem; color: #f1c40f; font-weight: bold; margin-bottom: 10px; text-align: center; text-transform: uppercase;">Ingreso Manual de Coordenadas</p>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 0.8fr; gap: 5px; margin-bottom: 8px; align-items: center;">
                <input type="number" id="manual-lat-ini" step="any" placeholder="Latitud">
                <input type="number" id="manual-lng-ini" step="any" placeholder="Longitud">
                <button type="button" class="btn-secundario" style="background:#27ae60; font-size: 0.7rem; padding: 8px 2px;" onclick="marcarGPS('ini')">GPS INICIAL</button>
                <button type="button" class="btn-secundario" style="background:#2980b9; font-size: 0.7rem; padding: 8px 2px;" onclick="ubicarManual('ini')">UBICAR</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 0.8fr; gap: 5px; align-items: center;">
                <input type="number" id="manual-lat-fin" step="any" placeholder="Latitud">
                <input type="number" id="manual-lng-fin" step="any" placeholder="Longitud">
                <button type="button" class="btn-secundario" style="background:#c0392b; font-size: 0.7rem; padding: 8px 2px;" onclick="marcarGPS('fin')">GPS FINAL</button>
                <button type="button" class="btn-secundario" style="background:#2980b9; font-size: 0.7rem; padding: 8px 2px;" onclick="ubicarManual('fin')">UBICAR</button>
            </div>

            <div style="display: flex; justify-content: space-around; margin-top: 12px; border-top: 1px solid #334155; padding-top: 8px;">
                <div style="text-align: center;">
                    <span style="display: block; font-size: 0.65rem; color: #94a3b8;">GPS INICIAL</span>
                    <span id="display-lat-ini" style="font-size: 0.8rem; font-weight: bold; color: white;">0.000000</span>
                </div>
                <div style="text-align: center;">
                    <span style="display: block; font-size: 0.65rem; color: #94a3b8;">GPS FINAL</span>
                    <span id="display-lat-fin" style="font-size: 0.8rem; font-weight: bold; color: white;">0.000000</span>
                </div>
            </div>
        </div>

        <button type="button" class="btn-enviar" style="margin-top: 20px;" onclick="generarPDFPoda()">GENERAR INFORME PODA</button>
    </form>
</div>  
<script src="app.js"></script>
</body>
</html>
